version: '3.8'

services:
  warrant3-web:
    container_name: warrant3-web-frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Maps the host port 3001 to the container port 3000 to avoid conflicts
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
